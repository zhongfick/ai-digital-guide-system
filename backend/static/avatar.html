<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>body{margin:0;overflow:hidden}canvas{display:block}</style>
</head>
<body>
  <!-- 非 module 脚本：页面一加载就可用，解决 App WebView 指令过早发送的问题 -->
  <script>
    window.__avatarCommandQueue__ = [];
    window.sendAvatarCommand = function(action) {
      if (window.avatarControl && window.avatarControl.sendCommand) {
        window.avatarControl.sendCommand(action);
        return true;
      }
      window.__avatarCommandQueue__.push(action);
      console.log('指令已排队:', action);
      return false;
    };
    window.__flushAvatarCommands__ = function() {
      while (window.__avatarCommandQueue__.length > 0) {
        var cmd = window.__avatarCommandQueue__.shift();
        window.avatarControl.sendCommand(cmd);
        console.log('执行排队指令:', cmd);
      }
    };
    window.__notifyFlutterReady__ = function() {
      if (window.flutter_inappwebview && window.flutter_inappwebview.callHandler) {
        window.flutter_inappwebview.callHandler('avatarReady');
      }
      window.parent.postMessage(JSON.stringify({ type: 'avatarReady' }), '*');
    };
    window.addEventListener('message', function(event) {
      try {
        var data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
        if (data && data.type === 'avatarCommand' && data.action) {
          window.sendAvatarCommand(data.action);
        }
      } catch (e) {}
    });
  </script>

 <script type="importmap">
{
  "imports": {
    "three": "/static/vendor/three.module.js",
    "three/addons/": "/static/vendor/three/addons/",
    "@pixiv/three-vrm": "/static/vendor/three-vrm.module.min.js"
  }
}
</script>
  <script type="module">
    import * as THREE from 'three';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.8, 7.5);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 1.2;
    controls.maxDistance = 12;
    controls.maxPolarAngle = Math.PI * 0.48;

    scene.add(new THREE.AmbientLight(0xffffff, 1.5));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
    dirLight.position.set(2, 4, 3);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(2.8, 48),
      new THREE.MeshStandardMaterial({ color: 0xdfefff, roughness: 1 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.02;
    scene.add(ground);

    const loader = new FBXLoader();
    const clock = new THREE.Clock();

    let avatarRoot = null;
    let mixer = null;
    let idleAction = null;
    let talkingAction = null;
    let currentAction = null;
    let activeState = 'idle';
    let pendingState = 'idle';
    let idleClip = null;
    let talkingClip = null;
    let talkIntensity = 0;

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function loadClipFromFBX(path) {
      return new Promise((resolve, reject) => {
        loader.load(path, resolve, undefined, reject);
      });
    }

    function fitAvatarToView(root) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const maxDimension = Math.max(size.x, size.y, size.z);
      const targetHeight = 1.9;
      const scale = maxDimension > 0 ? targetHeight / maxDimension : 1;
      root.scale.setScalar(scale);

      box.setFromObject(root);
      box.getCenter(center);
      box.getSize(size);

      const floorY = box.min.y;
      root.position.x -= center.x;
      root.position.y -= floorY;
      root.position.z -= center.z;

      const fittedBox = new THREE.Box3().setFromObject(root);
      const fittedSize = new THREE.Vector3();
      const fittedCenter = new THREE.Vector3();
      fittedBox.getSize(fittedSize);
      fittedBox.getCenter(fittedCenter);

      controls.target.set(fittedCenter.x, fittedCenter.y + fittedSize.y * 0.35, fittedCenter.z);
      camera.position.set(fittedCenter.x, fittedCenter.y + fittedSize.y * 0.65, fittedCenter.z + fittedSize.length() * 1.8 + 1.5);
      camera.lookAt(controls.target);
    }

    function setupAvatar(root) {
      avatarRoot = root;
      avatarRoot.traverse((obj) => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
          if (obj.material) {
            obj.material.transparent = false;
            obj.material.needsUpdate = true;
          }
        }
      });
      avatarRoot.position.set(0, -0.45, 0);
      avatarRoot.rotation.y = 0;
      avatarRoot.scale.setScalar(1);
      scene.add(avatarRoot);
      fitAvatarToView(avatarRoot);
      mixer = new THREE.AnimationMixer(avatarRoot);
    }

    function stopAction(action) {
      if (!action) return;
      action.stop();
      action.paused = true;
      action.enabled = false;
    }

    function playAction(action) {
      if (!action) return;
      action.enabled = true;
      action.paused = false;
      action.reset();
      action.setLoop(THREE.LoopRepeat);
      action.clampWhenFinished = false;
      action.timeScale = 1;
      action.play();
      currentAction = action;
    }

    function setTalkingState(isTalking) {
      activeState = isTalking ? 'talking' : 'idle';
      if (isTalking) {
        stopAction(idleAction);
        playAction(talkingAction || idleAction);
      } else {
        stopAction(talkingAction);
        playAction(idleAction || talkingAction);
      }
    }

    function handleCommand(action) {
      if (action === 'startTalking') {
        pendingState = 'talking';
        setTalkingState(true);
        console.log('切换为讲话状态');
      } else if (action === 'stopTalking') {
        pendingState = 'idle';
        setTalkingState(false);
        console.log('切换为待机状态');
      }
    }

    window.avatarControl = {
      sendCommand(action) {
        handleCommand(action);
      }
    };

    window.sendAvatarCommand = window.sendAvatarCommand || function(action) {
      handleCommand(action);
      return true;
    };

    window.__flushAvatarCommands__ = window.__flushAvatarCommands__ || function() {};
    window.__notifyFlutterReady__ = window.__notifyFlutterReady__ || function() {};
    window.__flushAvatarCommands__();
    window.__notifyFlutterReady__();

    Promise.all([
      loadClipFromFBX('/static/Idle.fbx'),
      loadClipFromFBX('/static/Talking.fbx')
    ]).then(([idleFbx, talkingFbx]) => {
      if (idleFbx.animations && idleFbx.animations.length > 0) {
        idleClip = idleFbx.animations[0];
      }
      if (talkingFbx.animations && talkingFbx.animations.length > 0) {
        talkingClip = talkingFbx.animations[0];
      }

      const idleScene = idleFbx.scene || idleFbx;
      setupAvatar(idleScene);

      if (idleClip) {
        idleAction = mixer.clipAction(idleClip);
        idleAction.loop = THREE.LoopRepeat;
        idleAction.clampWhenFinished = false;
      }

      if (talkingClip) {
        talkingAction = mixer.clipAction(talkingClip);
        talkingAction.loop = THREE.LoopRepeat;
        talkingAction.clampWhenFinished = false;
      }

      if (idleAction) playAction(idleAction);

      if (talkingAction) talkingAction.enabled = true;
      if (idleAction) idleAction.enabled = true;

      if (pendingState === 'talking' && talkingAction) {
        setTalkingState(true);
      } else {
        setTalkingState(false);
      }
      console.log('数字人资源加载完成');
      window.__notifyFlutterReady__();
    }).catch((err) => {
      console.error('FBX 加载失败:', err);
    });

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      talkIntensity += ((activeState === 'talking' ? 1 : 0) - talkIntensity) * 0.08;
      if (mixer) {
        mixer.update(delta);
      }

      if (avatarRoot && avatarRoot.morphTargetInfluences) {
        for (let i = 0; i < avatarRoot.morphTargetInfluences.length; i += 1) {
          avatarRoot.morphTargetInfluences[i] = clamp(talkIntensity, 0, 1);
        }
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
