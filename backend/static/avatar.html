<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>body{margin:0;overflow:hidden}canvas{display:block}</style>
</head>
<body>
 <script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.157.0/examples/jsm/",
    "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.5.3/lib/three-vrm.module.min.js"
  }
}
</script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

    // ★★★ 新增：读取 URL 参数并执行对应动作 ★★★
    (function() {
      var params = new URLSearchParams(window.location.search);
      var action = params.get('action');
      if (action === 'startTalking') {
        window.__pendingAction__ = 'startTalking';
        console.log('URL参数: 等待加载完成后开始说话');
      } else if (action === 'stopTalking') {
        window.__pendingAction__ = 'stopTalking';
        console.log('URL参数: 等待加载完成后停止说话');
      } else if (action === 'wave' || action === 'nod' || action === 'shake') {
        window.__pendingAction__ = action;
        console.log('URL参数: 等待加载完成后做动作', action);
      }
    })();

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 10);
    camera.position.set(0, 1.4, 2.5);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;

    const loader = new GLTFLoader();
    loader.register(parser => new VRMLoaderPlugin(parser));

    let vrm = null;
    window.vrm = vrm;
    let time = 0;
    let isTalking = false;
    let talkTime = 0;
    let gestureType = 'none';
    let gestureTime = 0;
    let pendingAction = window.__pendingAction__ || null;  // ★★★ 保存待执行的动作 ★★★

    loader.load(
      'http://127.0.0.1:8000/static/Mushy.vrm',
      (gltf) => {
        vrm = gltf.userData.vrm;
        VRMUtils.rotateVRM0(vrm);
        scene.add(vrm.scene);
        window.vrm = vrm; 

        // 面向观众
        vrm.scene.rotation.y = Math.PI;

        // 放下手臂
        if (vrm.humanoid) {
          const leftArm = vrm.humanoid.getNormalizedBoneNode('leftUpperArm');
          const rightArm = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');
          if (leftArm) leftArm.rotation.set(0, 0, 0.5);
          if (rightArm) rightArm.rotation.set(0, 0, -0.5);
          const leftFore = vrm.humanoid.getNormalizedBoneNode('leftLowerArm');
          const rightFore = vrm.humanoid.getNormalizedBoneNode('rightLowerArm');
          if (leftFore) leftFore.rotation.set(0, 0, 0.3);
          if (rightFore) rightFore.rotation.set(0, 0, -0.3);
        }

        console.log('VRM加载成功');

        // ★★★ 加载完成后执行待执行的动作 ★★★
        if (pendingAction === 'startTalking') {
          isTalking = true;
          talkTime = 0;
          console.log('执行待执行动作: 开始说话');
        } else if (pendingAction === 'stopTalking') {
          isTalking = false;
          talkTime = 0;
          console.log('执行待执行动作: 停止说话');
        } else if (pendingAction === 'wave' || pendingAction === 'nod' || pendingAction === 'shake') {
          gestureType = pendingAction;
          gestureTime = 0;
          console.log('执行待执行动作:', pendingAction);
        }
        pendingAction = null;
      },
      undefined,
      (err) => {
        console.error('VRM加载失败:', err);
      }
    );

    // 轮询检查全局变量（兼容 Flutter 的 evaluateJavascript 调用）
    window.__commands__ = {
      action: 'none',
      timestamp: 0
    };

    setInterval(function() {
      var cmd = window.__commands__;
      if (cmd.timestamp > 0) {
        if (cmd.action === 'startTalking') {
          isTalking = true;
          talkTime = 0;
          console.log('轮询执行: 开始说话');
        } else if (cmd.action === 'stopTalking') {
          isTalking = false;
          talkTime = 0;
          console.log('轮询执行: 停止说话');
        } else if (cmd.action === 'wave' || cmd.action === 'nod' || cmd.action === 'shake') {
          gestureType = cmd.action;
          gestureTime = 0;
          console.log('轮询执行: 做动作', cmd.action);
        }
        cmd.timestamp = 0;
        cmd.action = 'none';
      }
    }, 200);

    function animate() {
      requestAnimationFrame(animate);
      
      if (vrm) {
        vrm.update(0.016);
        time += 0.02;
        talkTime += 0.02;
        gestureTime += 0.02;

        // 呼吸效果
        vrm.scene.position.y = Math.sin(time * 2) * 0.002;
        vrm.scene.rotation.z = Math.sin(time * 0.8) * 0.006;
        vrm.scene.rotation.x = Math.sin(time * 0.6 + 1) * 0.003;

        // 说话时动嘴巴
        if (isTalking && vrm.expressionManager) {
          const mouthValue = 0.3 + 0.7 * Math.abs(Math.sin(talkTime * 15));
          vrm.expressionManager.setValue('aa', mouthValue);
        } else if (vrm.expressionManager) {
          vrm.expressionManager.setValue('aa', 0);
        }

        // 做动作
        if (gestureType === 'wave' && gestureTime < 2.0) {
          if (vrm.humanoid) {
            const rightArm = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');
            if (rightArm) {
              rightArm.rotation.set(
                0,
                Math.sin(gestureTime * 8) * 0.3,
                -0.5 + Math.sin(gestureTime * 8) * 0.2
              );
            }
          }
        } else if (gestureType === 'nod' && gestureTime < 1.0) {
          if (vrm.humanoid) {
            const head = vrm.humanoid.getNormalizedBoneNode('head');
            if (head) {
              head.rotation.x = Math.sin(gestureTime * 6) * 0.2;
            }
          }
        } else if (gestureType === 'shake' && gestureTime < 1.0) {
          if (vrm.humanoid) {
            const head = vrm.humanoid.getNormalizedBoneNode('head');
            if (head) {
              head.rotation.y = Math.sin(gestureTime * 6) * 0.3;
            }
          }
        } else if (gestureTime >= 2.0) {
          gestureType = 'none';
        }
      }
      
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
