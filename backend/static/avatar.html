<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>body{margin:0;overflow:hidden}canvas{display:block}</style>
</head>
<body>
  <!-- 非 module 脚本：页面一加载就可用，解决 App WebView 指令过早发送的问题 -->
  <script>
    window.__avatarCommandQueue__ = [];
    window.sendAvatarCommand = function(action) {
      if (window.avatarControl && window.avatarControl.sendCommand) {
        window.avatarControl.sendCommand(action);
        return true;
      }
      window.__avatarCommandQueue__.push(action);
      console.log('指令已排队:', action);
      return false;
    };
    window.__flushAvatarCommands__ = function() {
      while (window.__avatarCommandQueue__.length > 0) {
        var cmd = window.__avatarCommandQueue__.shift();
        window.avatarControl.sendCommand(cmd);
        console.log('执行排队指令:', cmd);
      }
    };
    window.__notifyFlutterReady__ = function() {
      if (window.flutter_inappwebview && window.flutter_inappwebview.callHandler) {
        window.flutter_inappwebview.callHandler('avatarReady');
      }
      window.parent.postMessage(JSON.stringify({ type: 'avatarReady' }), '*');
    };
    window.addEventListener('message', function(event) {
      try {
        var data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
        if (data && data.type === 'avatarCommand' && data.action) {
          window.sendAvatarCommand(data.action);
        }
      } catch (e) {}
    });
  </script>

 <script type="importmap">
{
  "imports": {
    "three": "/static/vendor/three.module.js",
    "three/addons/": "/static/vendor/three/addons/",
    "@pixiv/three-vrm": "/static/vendor/three-vrm.module.min.js"
  }
}
</script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

    // 兼容当前打包产物：如果外部依赖缺失，尽量不中断头像页面加载
    const originalConsoleError = console.error.bind(console);
    console.error = (...args) => {
      const msg = args.map(v => String(v)).join(' ');
      if (msg.includes('NURBSCurve.js') || msg.includes('/static/vendor/three/addons/curves/')) {
        console.warn('已忽略可选的 NURBS 曲线模块缺失警告');
        return;
      }
      originalConsoleError(...args);
    };

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 10);
    camera.position.set(0, 1.4, 2.5);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;

    const loader = new GLTFLoader();
    const fbxLoader = new FBXLoader();
    loader.register(parser => new VRMLoaderPlugin(parser));

    let vrm = null;
    let mixer = null;
    let idleAction = null;
    let talkingAction = null;
    let currentAction = null;
    let idleClip = null;
    let talkingClip = null;
    let time = 0;
    let isTalking = false;
    let talkTime = 0;
    let gestureType = 'none';
    let gestureTime = 0;
    let nextRandomGestureAt = 0;

    const GESTURE_DURATIONS = { wave: 2.0, nod: 1.2, shake: 1.2, point: 1.5 };
    const RANDOM_GESTURES = ['wave', 'nod', 'shake', 'point'];

    const IDLE_STATE = {
      breathPhase: Math.random() * Math.PI * 2,
      swayPhase: Math.random() * Math.PI * 2,
      headPhase: Math.random() * Math.PI * 2,
      blinkAt: 1.5 + Math.random() * 2.5,
      blinkTimer: 0,
      gazeAt: 2.0 + Math.random() * 4.0,
      gazeTimer: 0,
      microActionAt: 8 + Math.random() * 12,
      microActionTimer: 0,
      microActionType: 'none',
      microActionSeed: Math.random() * 1000,
      breathingIntensity: 0.55,
      swayIntensity: 0.4,
      headIntensity: 0.5,
      gazeIntensity: 0.45,
      poseBlend: 0,
      targetPoseBlend: 0,
      targetPoseBlendSpeed: 0.02
    };

    function scheduleNextRandomGesture() {
      nextRandomGestureAt = talkTime + 1.5 + Math.random() * 2.5;
    }

    function randBetween(min, max) {
      return min + Math.random() * (max - min);
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function smoothstep(t) {
      const x = clamp(t, 0, 1);
      return x * x * (3 - 2 * x);
    }

    function stopAllActions() {
      if (idleAction) idleAction.stop();
      if (talkingAction) talkingAction.stop();
    }

    function playAction(action) {
      if (!action) return;
      if (currentAction === action) return;
      action.reset().fadeIn(0.25).play();
      if (currentAction) currentAction.fadeOut(0.25);
      currentAction = action;
    }

    function applyBasePose() {
      if (!vrm || !vrm.humanoid) return;
      const leftArm = vrm.humanoid.getNormalizedBoneNode('leftUpperArm');
      const rightArm = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');
      const leftFore = vrm.humanoid.getNormalizedBoneNode('leftLowerArm');
      const rightFore = vrm.humanoid.getNormalizedBoneNode('rightLowerArm');
      const head = vrm.humanoid.getNormalizedBoneNode('head');
      const spine = vrm.humanoid.getNormalizedBoneNode('spine');
      const chest = vrm.humanoid.getNormalizedBoneNode('chest');
      if (leftArm) leftArm.rotation.set(0.12, 0.03, 0.22);
      if (rightArm) rightArm.rotation.set(0.12, -0.03, -0.22);
      if (leftFore) leftFore.rotation.set(0.03, 0, 0.05);
      if (rightFore) rightFore.rotation.set(0.03, 0, -0.05);
      if (head) head.rotation.set(0, 0, 0);
      if (spine) spine.rotation.set(0, 0, 0);
      if (chest) chest.rotation.set(0, 0, 0);
    }

    function resetTransientPose() {
      if (!vrm || !vrm.humanoid) return;
      const head = vrm.humanoid.getNormalizedBoneNode('head');
      const spine = vrm.humanoid.getNormalizedBoneNode('spine');
      const chest = vrm.humanoid.getNormalizedBoneNode('chest');
      const leftArm = vrm.humanoid.getNormalizedBoneNode('leftUpperArm');
      const rightArm = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');
      const leftFore = vrm.humanoid.getNormalizedBoneNode('leftLowerArm');
      const rightFore = vrm.humanoid.getNormalizedBoneNode('rightLowerArm');
      if (head) head.rotation.set(0, 0, 0);
      if (spine) spine.rotation.set(0, 0, 0);
      if (chest) chest.rotation.set(0, 0, 0);
      if (leftArm) leftArm.rotation.set(0.12, 0.03, 0.22);
      if (rightArm) rightArm.rotation.set(0.12, -0.03, -0.22);
      if (leftFore) leftFore.rotation.set(0.03, 0, 0.05);
      if (rightFore) rightFore.rotation.set(0.03, 0, -0.05);
    }

    function startGesture(action) {
      gestureType = action;
      gestureTime = 0;
      console.log('开始动作:', action);
    }

    function pickRandomGesture() {
      return RANDOM_GESTURES[Math.floor(Math.random() * RANDOM_GESTURES.length)];
    }

    function startIdleMicroAction() {
      const options = ['none', 'nod', 'shake', 'tilt', 'shoulder'];
      IDLE_STATE.microActionType = options[Math.floor(Math.random() * options.length)];
      IDLE_STATE.microActionTimer = 0;
      IDLE_STATE.microActionAt = 8 + Math.random() * 14;
    }

    function handleCommand(action) {
      if (!vrm) {
        window.__pendingAction__ = action;
        console.log('VRM未加载，暂存指令:', action);
        return;
      }
      if (action === 'startTalking') {
        isTalking = true;
        talkTime = 0;
        IDLE_STATE.targetPoseBlend = 1;
        if (talkingAction) {
          playAction(talkingAction);
        }
        console.log('开始说话 + 播放 Talking.fbx');
      } else if (action === 'stopTalking') {
        isTalking = false;
        talkTime = 0;
        gestureType = 'none';
        IDLE_STATE.targetPoseBlend = 0;
        if (idleAction) {
          playAction(idleAction);
        }
        resetTransientPose();
        if (vrm.expressionManager) vrm.expressionManager.setValue('blink', 0);
        console.log('停止说话 + 切回 Idle.fbx');
      } else if (GESTURE_DURATIONS[action]) {
        startGesture(action);
      }
    }

    function applyIdlePose() {
      if (!vrm || !vrm.humanoid) return;

      const t = time;
      const breath = Math.sin(t * (Math.PI * 2) / randBetween(3.8, 5.6) + IDLE_STATE.breathPhase);
      const sway = Math.sin(t * (Math.PI * 2) / randBetween(8.0, 14.0) + IDLE_STATE.swayPhase);
      const headWobble = Math.sin(t * (Math.PI * 2) / randBetween(5.5, 9.5) + IDLE_STATE.headPhase);
      const noise = Math.sin(t * 1.7 + IDLE_STATE.microActionSeed) * 0.35 + Math.sin(t * 0.8 + IDLE_STATE.microActionSeed * 0.3) * 0.65;

      const spine = vrm.humanoid.getNormalizedBoneNode('spine');
      const chest = vrm.humanoid.getNormalizedBoneNode('chest');
      const head = vrm.humanoid.getNormalizedBoneNode('head');
      const neck = vrm.humanoid.getNormalizedBoneNode('neck');
      const leftArm = vrm.humanoid.getNormalizedBoneNode('leftUpperArm');
      const rightArm = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');
      const leftFore = vrm.humanoid.getNormalizedBoneNode('leftLowerArm');
      const rightFore = vrm.humanoid.getNormalizedBoneNode('rightLowerArm');
      const leftHand = vrm.humanoid.getNormalizedBoneNode('leftHand');
      const rightHand = vrm.humanoid.getNormalizedBoneNode('rightHand');

      const breatheAmount = 0.015 * IDLE_STATE.breathingIntensity;
      const swayAmount = 0.012 * IDLE_STATE.swayIntensity;
      const headAmount = 0.018 * IDLE_STATE.headIntensity;
      const gazeAmount = 0.01 * IDLE_STATE.gazeIntensity;

      if (spine) {
        spine.rotation.x += breatheAmount * breath * 0.35;
        spine.rotation.z += swayAmount * sway;
      }
      if (chest) {
        chest.rotation.x += breatheAmount * breath * 0.75;
        chest.rotation.y += swayAmount * sway * 0.45;
      }
      if (neck) {
        neck.rotation.y += headAmount * headWobble * 0.5;
        neck.rotation.z += headAmount * noise * 0.35;
      }
      if (head) {
        head.rotation.x += headAmount * breath * 0.5 + gazeAmount * noise * 0.4;
        head.rotation.y += headAmount * headWobble * 0.9;
        head.rotation.z += headAmount * noise * 0.55;
      }
      if (leftArm && rightArm) {
        leftArm.rotation.z += 0.002 * sway;
        rightArm.rotation.z -= 0.002 * sway;
        leftArm.rotation.x += 0.001 * breath * -1;
        rightArm.rotation.x += 0.001 * breath * -1;
      }
      if (leftFore && rightFore) {
        leftFore.rotation.z += 0.0015 * sway;
        rightFore.rotation.z -= 0.0015 * sway;
      }
      if (leftHand && rightHand) {
        leftHand.rotation.x += 0.001 * noise;
        rightHand.rotation.x -= 0.001 * noise;
      }

      IDLE_STATE.blinkTimer += 0.016;
      IDLE_STATE.gazeTimer += 0.016;
      IDLE_STATE.microActionTimer += 0.016;
      IDLE_STATE.poseBlend += (IDLE_STATE.targetPoseBlend - IDLE_STATE.poseBlend) * IDLE_STATE.targetPoseBlendSpeed;

      if (IDLE_STATE.blinkTimer >= IDLE_STATE.blinkAt) {
        const blink = Math.max(0, 1 - Math.abs(IDLE_STATE.blinkTimer - IDLE_STATE.blinkAt - 0.08) / 0.08);
        if (vrm.expressionManager) vrm.expressionManager.setValue('blink', blink);
        if (IDLE_STATE.blinkTimer > IDLE_STATE.blinkAt + 0.16) {
          IDLE_STATE.blinkTimer = 0;
          IDLE_STATE.blinkAt = 1.8 + Math.random() * 4.5;
        }
      } else if (vrm.expressionManager) {
        vrm.expressionManager.setValue('blink', 0);
      }

      if (IDLE_STATE.gazeTimer >= IDLE_STATE.gazeAt) {
        IDLE_STATE.gazeTimer = 0;
        IDLE_STATE.gazeAt = 2.0 + Math.random() * 4.5;
        IDLE_STATE.gazeTarget = {
          x: randBetween(-0.2, 0.2),
          y: randBetween(-0.08, 0.12)
        };
      }

      if (IDLE_STATE.microActionTimer >= IDLE_STATE.microActionAt) {
        startIdleMicroAction();
      }

      const micro = IDLE_STATE.microActionType;
      const microT = smoothstep(IDLE_STATE.microActionTimer / 1.2);
      if (micro !== 'none') {
        if (micro === 'nod' && head) {
          head.rotation.x += Math.sin(IDLE_STATE.microActionTimer * 6.5) * 0.05 * (1 - microT * 0.4);
        } else if (micro === 'shake' && head) {
          head.rotation.y += Math.sin(IDLE_STATE.microActionTimer * 6.0) * 0.06 * (1 - microT * 0.4);
        } else if (micro === 'tilt' && head) {
          head.rotation.z += Math.sin(IDLE_STATE.microActionTimer * 4.0) * 0.04 * (1 - microT * 0.4);
        } else if (micro === 'shoulder' && chest) {
          chest.rotation.z += Math.sin(IDLE_STATE.microActionTimer * 5.0) * 0.03 * (1 - microT * 0.4);
        }
        if (IDLE_STATE.microActionTimer > 1.3) {
          IDLE_STATE.microActionType = 'none';
          IDLE_STATE.microActionTimer = 0;
          IDLE_STATE.microActionAt = 8 + Math.random() * 14;
        }
      }
    }

    function applyGesturePose() {
      if (!vrm || !vrm.humanoid || gestureType === 'none') return;

      const gestureDuration = GESTURE_DURATIONS[gestureType] || 0;
      if (gestureTime >= gestureDuration) {
        gestureType = 'none';
        resetTransientPose();
        return;
      }

      const progress = smoothstep(gestureTime / gestureDuration);

      if (gestureType === 'wave') {
        const rightArm = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');
        const rightFore = vrm.humanoid.getNormalizedBoneNode('rightLowerArm');
        if (rightArm) {
          rightArm.rotation.set(
            -0.55,
            0.35 + Math.sin(gestureTime * 8) * 0.5,
            -0.65 + Math.sin(gestureTime * 8) * 0.35
          );
        }
        if (rightFore) {
          rightFore.rotation.set(0.2, 0.02, -0.45 + Math.sin(gestureTime * 8) * 0.25);
        }
      } else if (gestureType === 'nod') {
        const head = vrm.humanoid.getNormalizedBoneNode('head');
        if (head) {
          head.rotation.x += Math.sin(gestureTime * 6) * 0.25 * (1 - progress * 0.25);
        }
      } else if (gestureType === 'shake') {
        const head = vrm.humanoid.getNormalizedBoneNode('head');
        if (head) {
          head.rotation.y += Math.sin(gestureTime * 6) * 0.35 * (1 - progress * 0.2);
        }
      } else if (gestureType === 'point') {
        const rightArm = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');
        const rightFore = vrm.humanoid.getNormalizedBoneNode('rightLowerArm');
        if (rightArm) {
          rightArm.rotation.set(-0.82, 0.55, -0.95);
        }
        if (rightFore) {
          rightFore.rotation.set(0.18, 0, -0.85);
        }
      }
    }

    window.avatarControl = {
      sendCommand(action) {
        handleCommand(action);
      }
    };

    window.__flushAvatarCommands__();
    window.__notifyFlutterReady__();
    console.log('avatarControl 已就绪');

    loader.load(
      '/static/Mushy.vrm',
      (gltf) => {
        vrm = gltf.userData.vrm;
        VRMUtils.rotateVRM0(vrm);
        scene.add(vrm.scene);
        window.vrm = vrm;

        vrm.scene.rotation.y = Math.PI;
        applyBasePose();

        fbxLoader.load('/static/Idle.fbx', (idle) => {
          idleClip = idle.animations && idle.animations[0] ? idle.animations[0] : null;
          if (idleClip) {
            mixer = mixer || new THREE.AnimationMixer(vrm.scene);
            idleAction = mixer.clipAction(idleClip);
            idleAction.enabled = true;
            idleAction.loop = THREE.LoopRepeat;
            idleAction.clampWhenFinished = false;
            idleAction.play();
            currentAction = idleAction;
          }
        }, undefined, (err) => {
          console.error('Idle.fbx 加载失败:', err);
        });

        fbxLoader.load('/static/Talking.fbx', (talking) => {
          talkingClip = talking.animations && talking.animations[0] ? talking.animations[0] : null;
          if (talkingClip) {
            mixer = mixer || new THREE.AnimationMixer(vrm.scene);
            talkingAction = mixer.clipAction(talkingClip);
            talkingAction.enabled = true;
            talkingAction.loop = THREE.LoopRepeat;
            talkingAction.clampWhenFinished = false;
          }
        }, undefined, (err) => {
          console.error('Talking.fbx 加载失败:', err);
        });

        console.log('VRM加载成功');

        if (window.__pendingAction__) {
          handleCommand(window.__pendingAction__);
          window.__pendingAction__ = null;
        }
        window.__notifyFlutterReady__();
      },
      undefined,
      (err) => {
        console.error('VRM加载失败:', err);
      }
    );

    function animate() {
      requestAnimationFrame(animate);

      if (vrm) {
        time += 0.02;
        if (isTalking) talkTime += 0.02;
        gestureTime += 0.02;

        vrm.scene.position.y = Math.sin(time * 2) * 0.002;
        vrm.scene.rotation.z = Math.sin(time * 0.8) * 0.006;
        vrm.scene.rotation.x = Math.sin(time * 0.6 + 1) * 0.003;

        if (mixer) mixer.update(0.016);

        if (isTalking) {
          if (gestureType === 'none' && talkTime >= nextRandomGestureAt) {
            startGesture(pickRandomGesture());
            scheduleNextRandomGesture();
          }
        }

        if (!isTalking && gestureType === 'none') {
          applyIdlePose();
        }

        if (gestureType !== 'none') {
          applyGesturePose();
        }

        if (isTalking && vrm.expressionManager) {
          const mouthValue = 0.3 + 0.7 * Math.abs(Math.sin(talkTime * 15));
          vrm.expressionManager.setValue('aa', mouthValue);
        } else if (vrm.expressionManager) {
          vrm.expressionManager.setValue('aa', 0);
        }

        vrm.update(0.016);
      }

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
