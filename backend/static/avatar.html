<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>body{margin:0;overflow:hidden}canvas{display:block}</style>
</head>
<body>
  <!-- 非 module 脚本：页面一加载就可用，解决 App WebView 指令过早发送的问题 -->
  <script>
    window.__avatarCommandQueue__ = [];
    window.sendAvatarCommand = function(action) {
      if (window.avatarControl && window.avatarControl.sendCommand) {
        window.avatarControl.sendCommand(action);
        return true;
      }
      window.__avatarCommandQueue__.push(action);
      console.log('指令已排队:', action);
      return false;
    };
    window.__flushAvatarCommands__ = function() {
      while (window.__avatarCommandQueue__.length > 0) {
        var cmd = window.__avatarCommandQueue__.shift();
        window.avatarControl.sendCommand(cmd);
        console.log('执行排队指令:', cmd);
      }
    };
    window.__notifyFlutterReady__ = function() {
      if (window.flutter_inappwebview && window.flutter_inappwebview.callHandler) {
        window.flutter_inappwebview.callHandler('avatarReady');
      }
      window.parent.postMessage(JSON.stringify({ type: 'avatarReady' }), '*');
    };
    window.addEventListener('message', function(event) {
      try {
        var data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
        if (data && data.type === 'avatarCommand' && data.action) {
          window.sendAvatarCommand(data.action);
        }
      } catch (e) {}
    });
  </script>

 <script type="importmap">
{
  "imports": {
    "three": "/static/vendor/three.module.js",
    "three/addons/": "/static/vendor/three/addons/",
    "@pixiv/three-vrm": "/static/vendor/three-vrm.module.min.js"
  }
}
</script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 10);
    camera.position.set(0, 1.4, 2.5);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;

    const loader = new GLTFLoader();
    loader.register(parser => new VRMLoaderPlugin(parser));

    let vrm = null;
    let time = 0;
    let isTalking = false;
    let talkTime = 0;
    let gestureType = 'none';
    let gestureTime = 0;
    let nextRandomGestureAt = 0;

    const GESTURE_DURATIONS = { wave: 2.0, nod: 1.2, shake: 1.2, point: 1.5 };
    const RANDOM_GESTURES = ['wave', 'nod', 'shake', 'point'];

    function scheduleNextRandomGesture() {
      nextRandomGestureAt = talkTime + 1.5 + Math.random() * 2.5;
    }

    function resetPose() {
      if (!vrm || !vrm.humanoid) return;
      const leftArm = vrm.humanoid.getNormalizedBoneNode('leftUpperArm');
      const rightArm = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');
      const leftFore = vrm.humanoid.getNormalizedBoneNode('leftLowerArm');
      const rightFore = vrm.humanoid.getNormalizedBoneNode('rightLowerArm');
      const head = vrm.humanoid.getNormalizedBoneNode('head');
      if (leftArm) leftArm.rotation.set(0, 0, 0.5);
      if (rightArm) rightArm.rotation.set(0, 0, -0.5);
      if (leftFore) leftFore.rotation.set(0, 0, 0.3);
      if (rightFore) rightFore.rotation.set(0, 0, -0.3);
      if (head) head.rotation.set(0, 0, 0);
    }

    function startGesture(action) {
      gestureType = action;
      gestureTime = 0;
      console.log('开始动作:', action);
    }

    function pickRandomGesture() {
      return RANDOM_GESTURES[Math.floor(Math.random() * RANDOM_GESTURES.length)];
    }

    function handleCommand(action) {
      if (!vrm) {
        window.__pendingAction__ = action;
        console.log('VRM未加载，暂存指令:', action);
        return;
      }
      if (action === 'startTalking') {
        isTalking = true;
        talkTime = 0;
        startGesture(pickRandomGesture());
        scheduleNextRandomGesture();
        console.log('开始说话 + 立即做动作');
      } else if (action === 'stopTalking') {
        isTalking = false;
        talkTime = 0;
        gestureType = 'none';
        resetPose();
        console.log('停止说话');
      } else if (GESTURE_DURATIONS[action]) {
        startGesture(action);
      }
    }

    function applyGesturePose() {
      if (!vrm || !vrm.humanoid || gestureType === 'none') return;

      const gestureDuration = GESTURE_DURATIONS[gestureType] || 0;
      if (gestureTime >= gestureDuration) {
        resetPose();
        gestureType = 'none';
        return;
      }

      if (gestureType === 'wave') {
        const rightArm = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');
        const rightFore = vrm.humanoid.getNormalizedBoneNode('rightLowerArm');
        if (rightArm) {
          rightArm.rotation.set(
            -0.2,
            Math.sin(gestureTime * 8) * 0.5,
            -1.2 + Math.sin(gestureTime * 8) * 0.4
          );
        }
        if (rightFore) {
          rightFore.rotation.set(0, 0, -0.8 + Math.sin(gestureTime * 8) * 0.3);
        }
      } else if (gestureType === 'nod') {
        const head = vrm.humanoid.getNormalizedBoneNode('head');
        if (head) {
          head.rotation.x = Math.sin(gestureTime * 6) * 0.35;
        }
      } else if (gestureType === 'shake') {
        const head = vrm.humanoid.getNormalizedBoneNode('head');
        if (head) {
          head.rotation.y = Math.sin(gestureTime * 6) * 0.45;
        }
      } else if (gestureType === 'point') {
        const rightArm = vrm.humanoid.getNormalizedBoneNode('rightUpperArm');
        const rightFore = vrm.humanoid.getNormalizedBoneNode('rightLowerArm');
        if (rightArm) {
          rightArm.rotation.set(-0.6, 0.3, -1.3);
        }
        if (rightFore) {
          rightFore.rotation.set(0, 0, -0.9);
        }
      }
    }

    window.avatarControl = {
      sendCommand(action) {
        handleCommand(action);
      }
    };

    window.__flushAvatarCommands__();
    window.__notifyFlutterReady__();
    console.log('avatarControl 已就绪');

    loader.load(
      '/static/Mushy.vrm',
      (gltf) => {
        vrm = gltf.userData.vrm;
        VRMUtils.rotateVRM0(vrm);
        scene.add(vrm.scene);
        window.vrm = vrm;

        vrm.scene.rotation.y = Math.PI;
        resetPose();

        console.log('VRM加载成功');

        if (window.__pendingAction__) {
          handleCommand(window.__pendingAction__);
          window.__pendingAction__ = null;
        }
        window.__notifyFlutterReady__();
      },
      undefined,
      (err) => {
        console.error('VRM加载失败:', err);
      }
    );

    function animate() {
      requestAnimationFrame(animate);

      if (vrm) {
        time += 0.02;
        if (isTalking) talkTime += 0.02;
        gestureTime += 0.02;

        vrm.scene.position.y = Math.sin(time * 2) * 0.002;
        vrm.scene.rotation.z = Math.sin(time * 0.8) * 0.006;
        vrm.scene.rotation.x = Math.sin(time * 0.6 + 1) * 0.003;

        if (isTalking) {
          if (gestureType === 'none' && talkTime >= nextRandomGestureAt) {
            startGesture(pickRandomGesture());
            scheduleNextRandomGesture();
          }
        }

        if (gestureType !== 'none') {
          applyGesturePose();
        } else {
          resetPose();
        }

        if (isTalking && vrm.expressionManager) {
          const mouthValue = 0.3 + 0.7 * Math.abs(Math.sin(talkTime * 15));
          vrm.expressionManager.setValue('aa', mouthValue);
        } else if (vrm.expressionManager) {
          vrm.expressionManager.setValue('aa', 0);
        }

        vrm.update(0.016);
      }

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
